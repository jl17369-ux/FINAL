<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dog Trainer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
    
<div class="scene">

  <!-- Ceiling -->
  <div class="ceiling"></div>

  <!-- Back wall + painting -->
  <div class="back-wall">
    <div class="painting"></div>
  </div>

  <!-- Side walls -->
  <div class="wall-left"></div>
  <div class="wall-right"></div>

  <!-- Floor with perspective planks -->
  <div class="floor">
    <svg class="floor-svg" viewBox="0 0 100 50" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    </svg>
  </div>

  <div class="crack-flash" id="flash"></div>
  <div class="pet-glow" id="pet-flash"></div>
  <div class="heart-layer" id="heart-layer"></div>
  <div class="anger-layer" id="anger-layer"></div>
  <div class="poop-layer" id="poop-layer"></div>

  <img id="dog"
       src='dog.png'
       alt="dog"
       draggable="false"
        width = '50%'/>

  <div id="whip-arm">
    <img src = 'point.jpg' width="60%"/>
  </div>

  <div id="pet-hand">
    <img src="pet.jpg" width="20%" />
  </div>

  <!-- HUD -->
  <div class="meter-label left">Discipline</div>
  <div class="meter left">
    <div class="meter-fill whip" id="whip-meter"></div>
  </div>

  <div class="meter-label right">Happiness</div>
  <div class="meter right">
    <div class="meter-fill pet" id="pet-meter"></div>
  </div>

  <div class="hp-wrap">
    <div class="goal-text">Keep both bars balanced near the middle</div>
    <div class="hp-label">HP</div>
    <div class="hp-bar">
      <div class="hp-fill" id="hp-fill"></div>
    </div>
  </div>

  <div class="countdown" id="countdown">Click to start</div>
  <div class="hint">left click or right click the dog</div>
  <div class="death-screen" id="death-screen">
    <div>YOU DIED</div>
    <div class="death-subtext">Click to restart</div>
  </div>

</div>
<script src="script.js"></script>
</body>
</html>

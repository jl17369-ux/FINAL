<!DOCTYPE html>
<html lang="en">
<head>
  

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dog Whipper 3000 (it's a joke)</title>
  <style>

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
    }

    .scene {
      width: 100vw; height: 100vh;
      position: relative;
      perspective: 1000px;
    }

    /* Ceiling */
    .ceiling {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 50%;
      background: linear-gradient(to bottom, #c0a882 0%, #d4bb96 100%);
    }

    /* Side walls - left & right trapezoids */
    .wall-left {
      position: absolute;
      top: 0; left: 0;
      width: 18%; height: 100%;
      background: linear-gradient(to right, #8a6e4a, #b99a72);
      clip-path: polygon(0 0, 100% 20%, 100% 80%, 0 100%);
    }
    .wall-right {
      position: absolute;
      top: 0; right: 0;
      width: 18%; height: 100%;
      background: linear-gradient(to left, #8a6e4a, #b99a72);
      clip-path: polygon(0 20%, 100% 0, 100% 100%, 0 80%);
    }

    /* Back wall */
    .back-wall {
      position: absolute;
      top: 18%; left: 18%;
      width: 64%; height: 64%;
      background: #c9aa80;
    }
    /* Painting on back wall */
   


    /* Floor */
    .floor {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 50%;
      background: linear-gradient(to bottom, #7a5a2a 0%, #4a360f 100%);
      overflow: hidden;
    }
    

    /* Horizon line */


    /* ── DOG ── */
    #dog {
      position: absolute;
      
      top: 48%; left: 50%;
      transform: translate(-50%, -50%);
      width: 170px; height: 170px;
      cursor: pointer;
      user-select: none;
      -webkit-user-drag: none;
      filter: drop-shadow(0 12px 20px rgba(0,0,0,0.6));
      transition: filter 0.05s;
      z-index: 10;
    }
    #dog:hover { filter: drop-shadow(0 12px 20px rgba(0,0,0,0.6)) brightness(1.15); }
    #dog.shake { animation: dogShake 0.22s ease; }
    #dog.petted { animation: dogHappy 0.6s ease; }
    #dog.lunge { animation: dogLunge 0.4s cubic-bezier(0.18, 0.84, 0.22, 1); }

    @keyframes dogShake {
      0%   { transform: translate(-50%, -50%) rotate(0deg)   scale(1);    }
      12%  { transform: translate(-44%, -55%) rotate(-12deg) scale(1.10); }
      28%  { transform: translate(-56%, -45%) rotate(12deg)  scale(0.93); }
      44%  { transform: translate(-45%, -54%) rotate(-8deg)  scale(1.06); }
      60%  { transform: translate(-55%, -46%) rotate(8deg)   scale(0.97); }
      78%  { transform: translate(-48%, -51%) rotate(-3deg);               }
      100% { transform: translate(-50%, -50%) rotate(0deg)   scale(1);    }
    }

    @keyframes dogHappy {
      0%   { transform: translate(-50%, -50%) rotate(0deg) scale(1); }
      20%  { transform: translate(-50%, -51.5%) rotate(-3deg) scale(1.03); }
      45%  { transform: translate(-50%, -49%) rotate(2deg) scale(1.05); }
      70%  { transform: translate(-50%, -50.8%) rotate(-1deg) scale(1.02); }
      100% { transform: translate(-50%, -50%) rotate(0deg) scale(1); }
    }

    @keyframes dogLunge {
      0% {
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
        filter: drop-shadow(0 12px 20px rgba(0,0,0,0.6));
      }
      16% {
        transform: translate(-50%, -50%) scale(0.9) rotate(-2deg);
        filter: drop-shadow(0 8px 14px rgba(0,0,0,0.46));
      }
      58% {
        transform: translate(-50%, -45%) scale(3.35) rotate(2.5deg);
        filter: drop-shadow(0 42px 42px rgba(0,0,0,0.44));
      }
      100% {
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
        filter: drop-shadow(0 12px 20px rgba(0,0,0,0.6));
      }
    }

    /* ── POINTING ARM ── */
    #whip-arm {
      position: absolute;
      mix-blend-mode:multiply;
      bottom: 0; left: 0;
      width: 220vx; height: 320vx;
      transform-origin: bottom left;
      pointer-events: none;
      z-index: 20;
    }
    #whip-arm.swing { animation: whipSwing 0.42s cubic-bezier(0.22, 0.61, 0.36, 1); }

    @keyframes whipSwing {
      0%   { transform: rotate(-100deg)    rotateY(100deg)   rotateX(-100deg)   translateX(0)    translateY(0); }
      22%  { transform: rotate(-10deg)   rotateY(-5deg)  rotateX(4deg)   translateX(28px) translateY(40px); }
      48%  { transform: rotate(0deg)   rotateY(-10deg) rotateX(8deg)   translateX(30px) translateY(0px); }
      72%  { transform: rotate(-5deg)   rotateY(-11deg) rotateX(0deg)   translateX(0px) translateY(0px); }
      84%  { transform: rotate(0deg)   rotateY(-10deg) rotateX(8deg)   translateX(0px) translateY(0px); }
      100% { transform: rotate(0deg)    rotateY(0deg)   rotateX(0deg)   translateX(0)    translateY(0); }
    }

    /* ── RIGHT PETTING HAND ── */
    #pet-hand {
      position: absolute;
      mix-blend-mode: multiply;
      right: 10%;
      top: 40%;
      width: 40%;
      transform: translate(130px, -15px) rotate(28deg);
      transform-origin: 88% 18%;
      pointer-events: none;
      z-index: 21;
    }
    #pet-hand img {
      display: block;
      width: 100%;
      height: auto;
    }
    #pet-hand.pet { animation: petDog 0.75s cubic-bezier(0.22, 0.61, 0.36, 1); }

    @keyframes petDog {
      0%   { transform: translate(130px, -15px) rotate(28deg); }
      18%  { transform: translate(70px, 0) rotate(12deg); }
      38%  { transform: translate(15px, 26px) rotate(1deg); }
      58%  { transform: translate(34px, 12px) rotate(8deg); }
      78%  { transform: translate(0, 32px) rotate(-2deg); }
      100% { transform: translate(130px, -15px) rotate(28deg); }
    }

    /* ── HUD ── */
    .hud-text {
      position: absolute;
      top: 18px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,240,0.85);
      font-family: 'Special Elite', serif;
      font-size: 15px;
      letter-spacing: 0.04em;
      text-shadow: 1px 2px 6px rgba(0,0,0,0.9);
      white-space: nowrap;
      pointer-events: none;
    }

    .meter {
      position: absolute;
      top: 54px;
      width: 42px;
      height: 150px;
      background: rgba(10,10,10,0.55);
      border: 3px solid rgba(255,255,255,0.28);
      border-radius: 20px;
      overflow: hidden;
      pointer-events: none;
      box-shadow: inset 0 0 24px rgba(0,0,0,0.45), 0 10px 24px rgba(0,0,0,0.3);
      z-index: 25;
    }
    .meter::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.12), transparent 26%, rgba(255,255,255,0.05));
      pointer-events: none;
    }
    .meter.left { left: 72px; }
    .meter.right { right: 72px; }

    .meter-fill {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 0%;
      transition: height 0.18s ease-out;
    }
    .meter-fill.whip {
      background: linear-gradient(to top, #7d0707 0%, #d31616 60%, #ff7c7c 100%);
      box-shadow: 0 0 18px rgba(255, 60, 60, 0.4);
    }
    .meter-fill.pet {
      background: linear-gradient(to top, #0d6120 0%, #22ba48 60%, #98f5a0 100%);
      box-shadow: 0 0 18px rgba(70, 255, 120, 0.35);
    }

    .meter-label {
      position: absolute;
      top: 24px;
      font-family: 'Special Elite', serif;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.88);
      text-shadow: 1px 2px 5px rgba(0,0,0,0.8);
      pointer-events: none;
      z-index: 25;
    }
    .meter-label.left { left: 62px; }
    .meter-label.right { right: 62px; }

    .hint {
      position: absolute;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.35);
      font-family: 'Special Elite', serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .countdown {
      position: absolute;
      top: 90px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 180px;
      padding: 10px 18px;
      border: 2px solid rgba(255,255,255,0.22);
      border-radius: 999px;
      background: rgba(0,0,0,0.45);
      color: rgba(255,255,255,0.92);
      font-family: 'Special Elite', serif;
      font-size: 18px;
      letter-spacing: 0.14em;
      text-align: center;
      text-transform: uppercase;
      text-shadow: 1px 2px 5px rgba(0,0,0,0.8);
      pointer-events: none;
      z-index: 27;
      transition: opacity 0.25s ease;
    }

    .countdown.hidden {
      opacity: 0;
    }

    .hp-wrap {
      position: absolute;
      left: 50%;
      bottom: 44px;
      transform: translateX(-50%);
      width: min(420px, 58vw);
      pointer-events: none;
      z-index: 26;
    }

    .goal-text {
      margin-bottom: 12px;
      text-align: center;
      color: rgba(255,255,255,0.8);
      font-family: 'Special Elite', serif;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 1px 2px 5px rgba(0,0,0,0.75);
    }

    .hp-label {
      margin-bottom: 8px;
      text-align: center;
      color: rgba(255,255,255,0.9);
      font-family: 'Special Elite', serif;
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 1px 2px 5px rgba(0,0,0,0.8);
    }

    .hp-bar {
      height: 24px;
      background: rgba(18,18,18,0.72);
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 999px;
      overflow: hidden;
      box-shadow: inset 0 0 18px rgba(0,0,0,0.45), 0 8px 18px rgba(0,0,0,0.28);
    }

    .hp-fill {
      width: 100%;
      height: 100%;
      background: linear-gradient(to right, #7d0707 0%, #dc2c2c 55%, #ffb36a 100%);
      box-shadow: 0 0 20px rgba(255, 72, 72, 0.35);
      transition: width 0.2s ease-out;
    }

    .hp-fill.poisoned {
      background: linear-gradient(to right, #0f5a18 0%, #2ac446 55%, #a6ff81 100%);
      box-shadow: 0 0 20px rgba(86, 255, 122, 0.4);
    }

    .death-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0);
      color: rgba(255, 255, 255, 0);
      font-family: 'Special Elite', serif;
      font-size: clamp(44px, 9vw, 110px);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-shadow: 0 0 24px rgba(255, 255, 255, 0.18);
      pointer-events: none;
      z-index: 40;
      transition: background 1s ease, color 0.8s ease;
    }

    .death-screen.show {
      background: rgba(0, 0, 0, 0.96);
      color: rgba(255, 255, 255, 0.95);
    }

    .death-screen.ready {
      pointer-events: auto;
      cursor: pointer;
    }

    .death-subtext {
      font-size: clamp(14px, 2vw, 22px);
      letter-spacing: 0.12em;
      opacity: 0.84;
    }

    /* Crack flash on dog click */
    .crack-flash {
      position: absolute;
      top: 48%; left: 50%;
      transform: translate(-50%, -50%);
      width: 40px; height: 40px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,240,100,0.9) 0%, rgba(255,180,0,0.4) 50%, transparent 70%);
      pointer-events: none;
      opacity: 0;
      z-index: 15;
    }
    .crack-flash.pop { animation: crackPop 0.18s ease-out forwards; }

    @keyframes crackPop {
      0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.2); }
      50%  { opacity: 0.9; transform: translate(-50%, -50%) scale(1.4); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(2); }
    }

    .pet-glow {
      position: absolute;
      top: 48%; left: 50%;
      transform: translate(-50%, -50%);
      width: 110px; height: 70px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,244,196,0.75) 0%, rgba(255,209,102,0.38) 50%, transparent 75%);
      pointer-events: none;
      opacity: 0;
      z-index: 9;
    }
    .pet-glow.pop { animation: petGlow 0.45s ease-out forwards; }

    @keyframes petGlow {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.85); }
      25%  { opacity: 1; transform: translate(-50%, -50%) scale(1.02); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.28); }
    }

    .heart-layer {
      position: absolute;
      top: 41%;
      left: 50%;
      width: 180px;
      height: 160px;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 19;
    }

    .heart {
      position: absolute;
      left: 50%;
      bottom: 18px;
      color: #ff7cab;
      font-size: 28px;
      line-height: 1;
      opacity: 0;
      text-shadow: 0 0 10px rgba(255, 124, 171, 0.45);
      animation: floatHeart 1.4s ease-out forwards;
    }

    @keyframes floatHeart {
      0% {
        opacity: 0;
        transform: translate(-50%, 12px) scale(0.75);
      }
      20% {
        opacity: 1;
        transform: translate(calc(-50% + var(--drift-x, 0px)), -6px) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--drift-x, 0px)), calc(-92px + var(--drift-y, 0px))) scale(1.18);
      }
    }

    .anger-layer {
      position: absolute;
      top: 39%;
      left: 50%;
      width: 190px;
      height: 170px;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 19;
    }

    .anger {
      position: absolute;
      left: 50%;
      bottom: 16px;
      font-size: 30px;
      line-height: 1;
      opacity: 0;
      filter: drop-shadow(0 0 10px rgba(255, 140, 64, 0.45));
      animation: floatAnger 1.1s ease-out forwards;
    }

    @keyframes floatAnger {
      0% {
        opacity: 0;
        transform: translate(-50%, 10px) scale(0.7);
      }
      20% {
        opacity: 1;
        transform: translate(calc(-50% + var(--drift-x, 0px)), -8px) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--drift-x, 0px)), calc(-82px + var(--drift-y, 0px))) scale(1.14);
      }
    }

    .poop-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 11;
    }

    .poop {
      position: absolute;
      font-size: 42px;
      line-height: 1;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.35));
      animation: poopDrop 0.45s cubic-bezier(0.21, 0.84, 0.32, 1.1);
    }

    @keyframes poopDrop {
      0% {
        opacity: 0;
        transform: translate(-50%, -90px) scale(0.55) rotate(-14deg);
      }
      65% {
        opacity: 1;
        transform: translate(-50%, -20px) scale(1.08) rotate(8deg);
      }
      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
      }
    }
  </style>
</head>
<body>
    
<div class="scene">

  <!-- Ceiling -->
  <div class="ceiling"></div>

  <!-- Back wall + painting -->
  <div class="back-wall">
    <div class="painting"></div>
  </div>

  <!-- Side walls -->
  <div class="wall-left"></div>
  <div class="wall-right"></div>

  <!-- Floor with perspective planks -->
  <div class="floor">
    <svg class="floor-svg" viewBox="0 0 100 50" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    </svg>
  </div>

  <div class="crack-flash" id="flash"></div>
  <div class="pet-glow" id="pet-flash"></div>
  <div class="heart-layer" id="heart-layer"></div>
  <div class="anger-layer" id="anger-layer"></div>
  <div class="poop-layer" id="poop-layer"></div>

  <img id="dog"
       src='dog.png'
       alt="dog"
       draggable="false"
        width = '50%'/>

  <div id="whip-arm">
    <img src = 'point.jpg' width="60%"/>
  </div>

  <div id="pet-hand">
    <img src="pet.jpg" width="20%" />
  </div>

  <!-- HUD -->
  <div class="meter-label left">Discipline</div>
  <div class="meter left">
    <div class="meter-fill whip" id="whip-meter"></div>
  </div>

  <div class="meter-label right">Happiness</div>
  <div class="meter right">
    <div class="meter-fill pet" id="pet-meter"></div>
  </div>

  <div class="hp-wrap">
    <div class="goal-text">Keep both bars balanced near the middle</div>
    <div class="hp-label">HP</div>
    <div class="hp-bar">
      <div class="hp-fill" id="hp-fill"></div>
    </div>
  </div>

  <div class="countdown" id="countdown">Click to start</div>
  <div class="hint">left click or right click the dog</div>
  <div class="death-screen" id="death-screen">
    <div>YOU DIED</div>
    <div class="death-subtext">Click to restart</div>
  </div>

</div>

<script>
  const normalDogSrc = 'dog.png';
  const aggressiveDogSrc = 'aggresssive dog.webp';
  let sound = new Audio('howl.mp3')
  let sound2 = new Audio('baddog.wav')
  let sound3 = new Audio('puppy.wav')
  let roarSound = new Audio('roar.wav')
  const dog   = document.getElementById('dog');
  const arm   = document.getElementById('whip-arm');
  const petHand = document.getElementById('pet-hand');
  const flash = document.getElementById('flash');
  const petFlash = document.getElementById('pet-flash');
  const heartLayer = document.getElementById('heart-layer');
  const angerLayer = document.getElementById('anger-layer');
  const poopLayer = document.getElementById('poop-layer');
  const whipMeter = document.getElementById('whip-meter');
  const petMeter = document.getElementById('pet-meter');
  const hpFill = document.getElementById('hp-fill');
  const countdown = document.getElementById('countdown');
  const deathScreen = document.getElementById('death-screen');
  let whipLevel = 50;
  let petLevel = 50;
  let hpLevel = 100;
  let isLunging = false;
  let isDead = false;
  let canRestart = false;
  let decayStarted = false;
  let gameStarted = false;
  let countdownActive = false;
  let deathReloadTimer = null;
  let deathClickEnableTimer = null;
  let countdownTimer = null;
  let decayInterval = null;
  let lastZeroDisciplinePoopAt = 0;
  let lastZeroHappinessLungeAt = 0;
  const maxMeter = 100;
  const whipStep = 18;
  const petStep = 18;
  const lungeDamage = 25;
  const decayPerTick = 2;
  const poisonDamagePerPoop = 0.25;
  const poisonTickMs = 400;
  const decayCountdownSeconds = 3;
  const zeroDisciplinePoopCooldownMs = 900;
  const zeroHappinessLungeCooldownMs = 1200;

  function renderMeters() {
    whipMeter.style.height = `${whipLevel}%`;
    petMeter.style.height = `${petLevel}%`;
  }

  function renderHp() {
    hpFill.style.width = `${hpLevel}%`;
    hpFill.classList.toggle('poisoned', poopLayer.querySelectorAll('.poop').length > 0 && !isDead);
  }

  function applyPoisonDamage() {
    if (isDead) return;

    const poopCount = poopLayer.querySelectorAll('.poop').length;
    if (poopCount === 0) return;

    hpLevel = Math.max(0, hpLevel - (poisonDamagePerPoop * poopCount));
    renderHp();

    if (hpLevel === 0) {
      triggerDeath();
    }
  }

  function restartGame() {
    window.location.reload();
  }

  function triggerDeath() {
    if (isDead) return;

    isDead = true;
    isLunging = true;
    canRestart = false;
    deathScreen.classList.add('show');
    deathClickEnableTimer = window.setTimeout(() => {
      canRestart = true;
      deathScreen.classList.add('ready');
    }, 2000);
    deathReloadTimer = window.setTimeout(restartGame, 4000);
  }

  function startDecayLoop() {
    if (decayStarted) return;

    decayStarted = true;
    countdownActive = false;
    countdown.classList.add('hidden');
    decayInterval = window.setInterval(() => {
      whipLevel = Math.max(0, whipLevel - decayPerTick);
      petLevel = Math.max(0, petLevel - decayPerTick);
      renderMeters();

      const now = Date.now();

      if (whipLevel === 0 && now - lastZeroDisciplinePoopAt >= zeroDisciplinePoopCooldownMs) {
        lastZeroDisciplinePoopAt = now;
        spawnPoop();
      }

      if (petLevel === 0 && now - lastZeroHappinessLungeAt >= zeroHappinessLungeCooldownMs) {
        lastZeroHappinessLungeAt = now;
        triggerDogLunge();
      }
    }, 60);
  }

  function startDecayCountdown() {
    if (gameStarted) return;

    gameStarted = true;
    countdownActive = true;
    let secondsLeft = decayCountdownSeconds;
    countdown.textContent = `Decay in ${secondsLeft}`;

    countdownTimer = window.setInterval(() => {
      secondsLeft -= 1;

      if (secondsLeft > 0) {
        countdown.textContent = `Decay in ${secondsLeft}`;
        return;
      }

      window.clearInterval(countdownTimer);
      countdownTimer = null;
      countdown.textContent = 'Go!';
      window.setTimeout(() => {
        startDecayLoop();
      }, 250);
    }, 1000);
  }

  function spawnHearts() {
    for (let i = 0; i < 3; i++) {
      const heart = document.createElement('span');
      heart.className = 'heart';
      heart.textContent = '♥';
      heart.style.left = `${38 + Math.random() * 24}%`;
      heart.style.setProperty('--drift-x', `${-26 + Math.random() * 52}px`);
      heart.style.setProperty('--drift-y', `${-12 - Math.random() * 28}px`);
      heart.style.animationDelay = `${i * 0.08}s`;
      heartLayer.appendChild(heart);
      heart.addEventListener('animationend', () => heart.remove(), { once: true });
    }
  }

  function spawnAnger() {
    for (let i = 0; i < 3; i++) {
      const anger = document.createElement('span');
      anger.className = 'anger';
      anger.textContent = '😠';
      anger.style.left = `${36 + Math.random() * 28}%`;
      anger.style.setProperty('--drift-x', `${-30 + Math.random() * 60}px`);
      anger.style.setProperty('--drift-y', `${-8 - Math.random() * 24}px`);
      anger.style.animationDelay = `${i * 0.06}s`;
      angerLayer.appendChild(anger);
      anger.addEventListener('animationend', () => anger.remove(), { once: true });
    }
  }

  function spawnPoop() {
    const poop = document.createElement('span');
    poop.className = 'poop';
    poop.textContent = '💩';
    poop.style.left = `${15 + Math.random() * 70}%`;
    poop.style.top = `${54 + Math.random() * 28}%`;
    poop.style.fontSize = `${28 + Math.random() * 44}px`;
    poopLayer.appendChild(poop);
    renderHp();
  }

  function cleanPoop() {
    const poops = poopLayer.querySelectorAll('.poop');
    const removeCount = Math.max(1, Math.ceil(poops.length / 3));

    for (let i = 0; i < removeCount && i < poops.length; i++) {
      poops[i].remove();
    }

    renderHp();
  }

  function triggerDogLunge() {
    if (isLunging || isDead) return;

    isLunging = true;
    hpLevel = Math.max(0, hpLevel - lungeDamage);
    renderHp();
    dog.src = aggressiveDogSrc;
    dog.classList.remove('lunge');
    void dog.offsetWidth;
    dog.classList.add('lunge');
    roarSound.currentTime = 0;
    roarSound.play();

    if (hpLevel === 0) {
      triggerDeath();
    }
  }

  dog.addEventListener('click', () => {
    if (!gameStarted) {
      startDecayCountdown();
      return;
    }

    if (countdownActive || isLunging || isDead) return;

    const wasFull = whipLevel >= maxMeter;
    whipLevel = Math.min(maxMeter, whipLevel + whipStep);
    renderMeters();
    cleanPoop();
    

    // Re-trigger whip swing
    arm.classList.remove('swing');
    void arm.offsetWidth;
    arm.classList.add('swing');

    // Re-trigger dog shake
    dog.classList.remove('shake');
    void dog.offsetWidth;
    dog.classList.add('shake');

    if (!wasFull && whipLevel >= maxMeter) {
      triggerDogLunge();
    }

    // Crack flash
    flash.classList.remove('pop');
    void flash.offsetWidth;
    flash.classList.add('pop');
    spawnAnger();
    sound.currentTime = 0.5;
    sound.play()
    sound2.currentTime = 0;
    sound2.play()
    


  });

  dog.addEventListener('contextmenu', (event) => {
    event.preventDefault();
    if (!gameStarted) {
      startDecayCountdown();
      return;
    }

    if (countdownActive || isLunging || isDead) return;

    const wasFull = petLevel >= maxMeter;
    petLevel = Math.min(maxMeter, petLevel + petStep);
    renderMeters();

    if (!wasFull && petLevel >= maxMeter) {
      spawnPoop();
    }

    petHand.classList.remove('pet');
    void petHand.offsetWidth;
    petHand.classList.add('pet');

    dog.classList.remove('petted');
    void dog.offsetWidth;
    dog.classList.add('petted');

    petFlash.classList.remove('pop');
    void petFlash.offsetWidth;
    petFlash.classList.add('pop');
    spawnHearts();
    
    sound3.currentTime=.01;
    sound3.play();
  });

  arm.addEventListener('animationend',   () => arm.classList.remove('swing'));
  dog.addEventListener('animationend',   () => dog.classList.remove('shake'));
  petHand.addEventListener('animationend', () => petHand.classList.remove('pet'));
  dog.addEventListener('animationend',   () => dog.classList.remove('petted'));
  dog.addEventListener('animationend', () => {
    dog.classList.remove('lunge');
    dog.src = normalDogSrc;
    if (!isDead) {
      isLunging = false;
    }
  });
  deathScreen.addEventListener('click', () => {
    if (!isDead || !canRestart) return;

    if (deathReloadTimer !== null) {
      window.clearTimeout(deathReloadTimer);
      deathReloadTimer = null;
    }

    if (deathClickEnableTimer !== null) {
      window.clearTimeout(deathClickEnableTimer);
      deathClickEnableTimer = null;
    }

    restartGame();
  });
  flash.addEventListener('animationend', () => flash.classList.remove('pop'));
  petFlash.addEventListener('animationend', () => petFlash.classList.remove('pop'));

  setInterval(() => {
    applyPoisonDamage();
  }, poisonTickMs);

  renderMeters();
  renderHp();
  document.addEventListener('click', () => {
    if (!gameStarted) {
      startDecayCountdown();
    }
  }, { once: true });
</script>
</body>
</html>
